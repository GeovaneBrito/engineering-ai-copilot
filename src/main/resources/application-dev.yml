spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/copilot_db}
    username: ${DATABASE_USERNAME:copilot}
    password: ${DATABASE_PASSWORD:copilot_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  # ----------------------------------------------------------
