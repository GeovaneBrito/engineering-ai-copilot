# ============================================================
# Engineering AI Copilot — Configuração Base
# ============================================================

spring:
  application:
    name: engineering-ai-copilot

  # ----------------------------------------------------------
  # JPA / Hibernate
  # ----------------------------------------------------------
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # ----------------------------------------------------------
  # Flyway — Migrações de banco de dados
  # ----------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ----------------------------------------------------------
  # Jackson
  # ----------------------------------------------------------
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # ----------------------------------------------------------
  # Spring AI (Placeholder para evitar erros no boot)
  # ----------------------------------------------------------
  ai:
    openai:
      api-key: "placeholder-key-for-local-bootstrap"

# ============================================================
# Server
# ============================================================
server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# ============================================================
# Actuator — Monitoramento e Health Checks
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# ============================================================
# SpringDoc / OpenAPI
# ============================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# ============================================================
# Logging
# ============================================================
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
